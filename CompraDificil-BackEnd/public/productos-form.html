<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Producto | compraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
</head>
<body>
    <div class="container">
        <div class="topbar">
            <div>
                <h2 id="title">Nuevo Producto</h2>
                <p class="subtitle" id="subtitle">Gestión de catálogo de inventario</p>
            </div>
            <div class="topbar-actions">
                <a class="btn" href="/productos.html">Volver</a>
            </div>
        </div>
        
        <section class="card">
            <div class="card-body">
                <form id="productForm" class="form">
                    <div class="grid2">
                        <div>
                            <label>SKU (Código)</label>
                            <input id="sku_producto" class="input" type="text" required placeholder="Ej: PAP-001">

                            <label>Nombre del Producto</label>
                            <input id="nombre_producto" class="input" type="text" required>

                            <label>Descripción</label>
                            <textarea id="descripcion_producto" class="input" rows="4"></textarea>

                            <label>Precio Base</label>
                            <input id="precio_base" class="input" type="number" step="0.01" required>
                        </div>

                        <div>
                            <label>Categoría</label>
                            <select id="id_categoria" class="input" required>
                                <option value="">Cargando categorías...</option>
                            </select>

                            <label>Unidad de Medida</label>
                            <select id="unidad_medida" class="input" required>
                                <option value="Pieza">Pieza</option>
                                <option value="Paquete">Paquete</option>
                                <option value="Galón">Galón</option>
                                <option value="Servicio">Servicio</option>
                                <option value="Caja">Caja</option>
                            </select>

                            <label>Stock Mínimo</label>
                            <input id="stock_minimo" class="input" type="number" value="0" required>

                            <div style="margin-top: 20px;">
                                <button class="btn btn-primary" type="submit" id="saveBtn">Guardar Producto</button>
                                <p id="msg" class="status"></p>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <script src="/js/productos-form.js"></script>
</body>
</html>
