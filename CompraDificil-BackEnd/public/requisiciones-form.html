<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nueva Requisición | CompraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <style>
        .cart-section { margin-top: 20px; border-top: 2px solid var(--border-cool); padding-top: 20px; }
        .row-flex { display: flex; gap: 10px; align-items: flex-end; margin-bottom: 15px; }
        /* Ajuste para que los 3 elementos de arriba quepan bien */
        .grid-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="topbar">
            <h2>Gestión de Requisición</h2>
            <a class="btn" href="/requisiciones.html">Cancelar</a>
        </header>

        <section class="card">
            <div class="card-body">
                <form id="reqForm">
                    <div class="grid-header">
                        <div>
                            <label>Justificación</label>
                            <textarea id="justificacion" class="input" required placeholder="¿Para qué se requiere este gasto?" style="height: 45px;"></textarea>
                        </div>
                        
                        <div>
                            <label for="id_estadoSC">Estado</label>
                            <select id="id_estadoSC" class="input" required>
                                <option value="">Cargando...</option>
                            </select>
                        </div>

                        <div>
                            <label>Prioridad</label>
                            <select id="prioridad" class="input">
                                <option value="Baja">Baja</option>
                                <option value="Media" selected>Media</option>
                                <option value="Alta">Alta</option>
                                <option value="Urgente">Urgente</option>
                            </select>
                        </div>
                    </div> <div class="cart-section">
                        <h3>Agregar Productos</h3>
                        <div class="row-flex">
                            <div style="flex: 2;">
                                <label>Producto</label>
                                <select id="selectProducto" class="input">
                                    <option value="">-- Selecciona un producto --</option>
                                </select>
                            </div>
                            <div style="flex: 1;">
                                <label>Cantidad</label>
                                <input type="number" id="inputCantidad" class="input" value="1" min="1">
                            </div>
                            <button type="button" id="btnAdd" class="btn btn-primary">Añadir</button>
                        </div>

                        <table class="table" id="tempTable">
                            <thead>
                                <tr>
                                    <th>Producto</th>
                                    <th>Cantidad</th>
                                    <th>Precio Est.</th>
                                    <th>Subtotal</th>
                                    <th>Acción</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>

                    <div style="margin-top: 30px; text-align: right;">
                        <h3 id="totalLabel">Total Estimado: $0.00</h3>
                        <button type="submit" class="btn btn-primary" style="padding: 15px 40px;">Guardar Requisición</button>
                    </div>
                </form>
            </div>
        </section>
    </div>
    <script src="/js/requisiciones-form.js"></script>
</body>
</html>
