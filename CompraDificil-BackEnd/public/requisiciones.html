<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Requisiciones | CompraFacil</title>
    <link rel="stylesheet" href="/css/usuarios.css">
    <style>
        .search-container { margin-bottom: 20px; display: flex; gap: 10px; }
        .search-input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-cool); }
        .btn-logout { background-color: #ff4d4d; color: white; }
        .btn-logout:hover { background-color: #cc0000; }
    </style>
</head>
<body>
    <div class="container">
        <header class="topbar">
            <div>
                <h2>Módulo de Requisiciones</h2>
                <p class="subtitle">Solicitudes de compra y estatus</p>
            </div>
            <div class="topbar-actions">
                <a class="btn" href="/dashboard.html">Volver</a>
                <a class="btn btn-primary" href="/requisiciones-form.html">+ Nueva Requisición</a>
                <button class="btn btn-logout" id="btnLogout">Cerrar Sesión</button>
            </div>
        </header>

        <section class="card">
            <div class="card-body">
                <div class="search-container">
                    <input type="text" id="searchInput" class="search-input" placeholder="Buscar por folio o solicitante...">
                </div>

                <p id="status" class="status">Cargando solicitudes...</p>
                <div class="table-responsive">
                    <table id="reqTable" class="table table-hover">
                        <thead>
                            <tr>
                                <th>Folio</th>
                                <th>Fecha</th>
                                <th>Solicitante</th>
                                <th>Departamento</th>
                                <th>Justificación</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-requisiciones"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <div id="modalDetalle" class="modal" style="display:none; position:fixed; z-index:1000; left:0; top:0; width:100%; height:100%; background: rgba(0,0,0,0.5);">
        <div class="modal-content" style="background:#fff; margin:5% auto; padding:20px; width:80%; max-width:900px; border-radius:8px; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            
            <div style="display:flex; flex-direction: column; border-bottom:1px solid #eee; padding-bottom:15px; position: relative;">
                <h3 id="modalFolio" style="margin: 0; color: var(--text-dark); font-size: 1.5rem;">Detalle de Requisición</h3>
                <div style="position: absolute; right: 0; top: 0; display:flex; gap: 8px;">
                    <button id="btnPDF" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem;">Exportar PDF</button>
                    <button id="btnExcel" class="btn btn-primary" style="padding: 6px 12px; font-size: 0.85rem;">Exportar Excel</button>
                    <button onclick="cerrarModal()" class="btn" style="background: #e74a3b; color: white; padding: 6px 12px; font-size: 0.85rem;">Volver</button>
                </div>
            </div>

            <div id="pdfContent" style="margin-top:20px; background: white; padding: 10px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; background: #f8f9fc; padding: 15px; border-radius: 8px;">
                    <p style="margin:0;"><strong>Solicitante:</strong> <span id="modalUsuario"></span></p>
                    <p style="margin:0;"><strong>Justificación:</strong> <span id="modalJustificacion"></span></p>
                </div>
                
                <h4 style="margin: 20px 0 10px 0; border-left: 4px solid #4e73df; padding-left: 10px;">Artículos Solicitados</h4>
                
                <div class="table-responsive">
                    <table class="table" style="width:100%; text-align:left; border-collapse: collapse;">
                        <thead style="background-color: #eaecf4;">
                            <tr>
                                <th style="padding: 12px; border-bottom: 2px solid #dee2e6;">Producto</th>
                                <th style="padding: 12px; border-bottom: 2px solid #dee2e6;">Cantidad</th>
                                <th style="padding: 12px; border-bottom: 2px solid #dee2e6;">Precio Est.</th>
                                <th style="padding: 12px; border-bottom: 2px solid #dee2e6;">Subtotal</th>
                            </tr>
                        </thead>
                        <tbody id="modalProductosBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style/dist/xlsx.bundle.js"></script>
    <script src="/js/requisiciones.js"></script>
</body>
</html>
