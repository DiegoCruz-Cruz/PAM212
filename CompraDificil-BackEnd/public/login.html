<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Iniciar Sesión | CompraDifícil</title>
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <main class="page">
        <section class="card">
            <header class="card-header">
                <div class="brand">
                    <div class="brand__mark">CF</div>
                    <div class="brand__text">
                        <div class="brand__name">Compra Difícil</div>
                        <div class="brand__tag">Acceso al sistema</div>
                    </div>
                </div>
            </header>

            <form id="loginForm" class="form" novalidate>
                <div class="field">
                    <label for="usuario" class="field__label">Correo electrónico</label>
                    <input type="email" id="usuario" name="usuario" class="field__input" 
                    autocomplete="username" placeholder="ejemplo@gmail.com" required>
                </div>

                <div class="field">
                    <label for="contrasena" class="field__label">Contraseña</label>
                    <input id="contrasena" class="field__input" type="password" 
                    autocomplete="current-password" placeholder="•••••••••" required>
                </div>

                <button type="submit" class="btn btn--primary">Entrar</button>
                <p id="msg" class="msg" aria-live="polite" style="color: red; margin-top: 10px;"></p>
            </form>

            <footer class="card__footer">
                <small>© <span id="year"></span> compraDificil</small>
            </footer>
        </section>
    </main>
    <script>
        document.getElementById("year").textContent = new Date().getFullYear();
    </script>
    <script src="/js/login.js"></script>
</body>
</html>
